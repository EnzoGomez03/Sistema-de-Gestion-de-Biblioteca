<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Panel de Socios</title>
</head>
<body>
    <div class="contenedor-principal">
        <h1>Socios de la Biblioteca</h1>
        <h2>Crear nuevo socio</h2>
        <form id="form-socio">
            <laber for="dni"> DNI:</laber>
            <!--El required es la validacion basica del navegador:
            no te deja enviar el formulario si ese campo quedo vacio
            -->
            <input type="text" id="dni" required>

            <label for="nombre">Nombre</label>
            <input type="text" id="nombre" required>
            
            <laber for="edad"> Edad:</laber>
            <input type="text" id="edad" required>

            <label for="direccion">Direccion</label>
            <input type="text" id="direccion" required>

            <label for="telefono">Telefono</label>
            <input type="text" id="nroTelefono" required>

            <div id="mensaje-error"></div>
            <button type="submit" > Crear Socio</button>
        </form>
        <div id="lista-socios"> Socios</div>
    </div>

    <script>
    function cargarSocios() {
        fetch("http://localhost:7070/socios")
            .then(respuesta => respuesta.json())
            .then(datos => {
                const contenedor = document.getElementById("lista-socios");
                contenedor.innerHTML = "";

                datos.forEach(socio => {
                    const tarjeta = document.createElement("div");
                    tarjeta.className = "socio-card";
                    const inicial = socio.nombre.charAt(0).toUpperCase();

                    tarjeta.innerHTML = `
                        <div class="avatar">${inicial}</div>
                        <div class="socio-info">
                            <strong>${socio.nombre}</strong>
                            <span>DNI: ${socio.dni}</span>
                            <span>Edad: ${socio.edad}</span>
                            <span>Tel: ${socio.nroTelefono}</span>
                            <span>Deuda: $${socio.deuda}</span>
                        </div>
                    `;
                    contenedor.appendChild(tarjeta);
                });
            })
        ;}

        cargarSocios();

        document.getElementById("form-socio").addEventListener("submit", function(evento) {
            evento.preventDefault();
            const nuevoSocio = {
                dni: document.getElementById("dni").value,
                nombre: document.getElementById("nombre").value,
                edad: Number(document.getElementById("edad").value),
                direccion: document.getElementById("direccion").value,
                nroTelefono: document.getElementById("nroTelefono").value
            };
            fetch("http://localhost:7070/socios", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(nuevoSocio)
            })
                .then(respuesta => respuesta.json().then(datos => ({ ok: respuesta.ok, datos })))
                .then(resultado => {
                    const mensajeError = document.getElementById("mensaje-error");
                    if (resultado.ok) {
                        console.log("Socio creado:", resultado.datos);
                        mensajeError.textContent = "";
                        evento.target.reset();
                        cargarSocios();
                    } else {
                        mensajeError.textContent = resultado.datos.error;
                    }
                }); 
        }); 
    </script>
</body>
</html>
